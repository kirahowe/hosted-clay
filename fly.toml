# The control plane: one always-on machine (it holds the SQLite file and
# runs the scheduler, so it must not autostop) with a small volume for
# state.
app = "hosted-clay"
primary_region = "yyz"

[build]

[env]
  PORT = "8080"
  # BASE_URL and HANKO_API_URL are set with `flyctl secrets set` or here
  # once the app has a hostname.

# Fly takes daily snapshots of the volume automatically (5-day retention by
# default; raise it with `fly volumes update <id> --snapshot-retention 14`).
# Those are a coarse safety net — point-in-time recovery comes from
# Litestream, which docker/start.sh runs whenever the LITESTREAM_REPLICA_URL
# secret is set (see the Deploy section of the README).
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
